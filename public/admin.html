<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FieldAxisHQ Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#060a10;color:#e8edf5;font-size:13px;display:flex}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1a2540;border-radius:2px}
/* SIDEBAR */
#sidebar{width:210px;min-width:210px;background:#0c1220;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-mark{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;background:linear-gradient(135deg,#e8edf5,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:9px;color:#414e63;letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.nav-section{padding:10px 12px 3px;font-size:9px;font-weight:600;color:#414e63;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:#8a96ab;font-size:12px;margin:1px 5px;transition:.15s;user-select:none}
.nav-item:hover{background:#131c2e;color:#e8edf5}
.nav-item.active{background:#1a2540;color:#e8edf5}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.sidebar-foot{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.06)}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px;background:#131c2e;border-radius:7px;cursor:pointer}
.user-pill:hover{background:#1a2540}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:48px;padding:0 18px;background:#0c1220;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.topbar-right{display:flex;gap:8px;align-items:center}
#page-area{flex:1;overflow-y:auto;padding:18px}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:#131c2e;color:#e8edf5;font-family:'DM Sans',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:#1a2540}.btn:active{opacity:.8}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}.btn-primary:hover{background:#1d4ed8}
.btn-green{background:rgba(22,163,74,.12);color:#16a34a;border-color:rgba(22,163,74,.2)}
.btn-red{background:rgba(220,38,38,.12);color:#dc2626;border-color:rgba(220,38,38,.2)}
.btn-amber{background:rgba(217,119,6,.12);color:#d97706;border-color:rgba(217,119,6,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}
/* FORMS */
.fg{margin-bottom:13px}
.fl{font-size:10px;font-weight:500;color:#414e63;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.fi,.fs,.ft{width:100%;padding:8px 11px;border:1px solid rgba(255,255,255,.1);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;background:#131c2e;color:#e8edf5;transition:.15s}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:#2563eb;background:#1a2540}
.ft{resize:vertical;min-height:70px;line-height:1.5}
.fi::placeholder{color:#414e63}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* CARDS */
.card{background:#0c1220;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:#414e63;text-transform:uppercase;letter-spacing:.07em;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.stat{background:#0c1220;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px}
.stat-label{font-size:10px;color:#414e63;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.stat-value{font-size:26px;font-weight:300}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 11px;border-bottom:1px solid rgba(255,255,255,.06);color:#414e63;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.tbl td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.tbl tbody tr{cursor:pointer}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.bg-green{background:rgba(22,163,74,.12);color:#16a34a}
.bg-amber{background:rgba(217,119,6,.12);color:#d97706}
.bg-blue{background:rgba(37,99,235,.12);color:#60a5fa}
.bg-red{background:rgba(220,38,38,.12);color:#dc2626}
.bg-gray{background:#1a2540;color:#8a96ab}
.bg-teal{background:rgba(13,148,136,.12);color:#2dd4bf}
.bg-purple{background:rgba(124,58,237,.12);color:#a78bfa}
/* TABS */
.tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;flex-shrink:0;background:#0c1220}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#414e63;transition:.15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:#8a96ab}.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:500}
/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-box{background:#0c1220;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;color:#414e63;font-size:20px;line-height:1}.modal-close:hover{color:#e8edf5}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
/* MISC */
.loading{padding:36px;text-align:center;color:#414e63;font-size:12px}
.empty{padding:36px;text-align:center;color:#414e63;font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px}
.pbar{height:4px;background:#1a2540;border-radius:2px;overflow:hidden}
.pb{height:100%;border-radius:2px;background:#2563eb;transition:width .3s}
.pb.green{background:#16a34a}.pb.amber{background:#d97706}.pb.red{background:#dc2626}
.gps-live{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;background:rgba(22,163,74,.12);color:#16a34a;border-radius:20px;font-size:10px;font-weight:500}
.pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.sec-hdr{font-size:10px;font-weight:600;color:#414e63;text-transform:uppercase;letter-spacing:.08em;padding:12px 0 7px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:11px}
.upload-zone{border:1.5px dashed rgba(255,255,255,.1);border-radius:10px;padding:18px;text-align:center;cursor:pointer}
.upload-zone:hover{border-color:#2563eb;background:rgba(37,99,235,.05)}
.upload-zone input{display:none}
.file-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#1a2540;border:1px solid rgba(255,255,255,.08);border-radius:6px;font-size:11px;color:#8a96ab;margin:2px}
.rm{cursor:pointer;color:#414e63;margin-left:2px}.rm:hover{color:#dc2626}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.insp-card{border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-bottom:10px}
.insp-hd{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:#131c2e;border-bottom:1px solid rgba(255,255,255,.06)}
.insp-body{padding:13px}
.co-card{background:#131c2e;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:13px;margin-bottom:9px}
.alert-row{display:flex;gap:9px;padding:8px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.06);margin-bottom:5px;align-items:flex-start}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.part-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.part-row:last-child{border-bottom:none}
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.chk-item:last-child{border-bottom:none}
.chk-box{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
.chk-box.checked{background:#16a34a;border-color:#16a34a}.chk-box.checked::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:9px}
.photo-card{background:#131c2e;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;cursor:pointer}
.photo-thumb{width:100%;height:95px;object-fit:cover;display:block}
.photo-ph{width:100%;height:95px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#414e63}
.fin-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fin-row:last-child{border-bottom:none}
.addr-dropdown{position:absolute;left:0;right:0;top:100%;z-index:200;background:#0c1220;border:1px solid rgba(255,255,255,.12);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.6);max-height:160px;overflow-y:auto;display:none}
.addr-item{padding:8px 12px;font-size:12px;color:#8a96ab;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)}
.addr-item:hover{background:#131c2e;color:#e8edf5}
.phase-bar{display:flex;gap:3px;margin-bottom:14px}
.phase-step{flex:1;height:4px;border-radius:99px;background:#1a2540}
.phase-step.done{background:#16a34a}.phase-step.cur{background:#d97706}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo"><div class="logo-mark">FieldAxisHQ</div><div class="logo-sub">Operations Platform</div></div>
  <div style="flex:1;padding:4px 0">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>Dashboard</div>
    <div class="nav-item" onclick="showPage('jobs',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 6h6M5 9h4"/></svg>All Jobs</div>
    <div class="nav-item" onclick="showPage('newjob',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>New Job</div>
    <div class="nav-item" onclick="showPage('schedule',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 7h12M5 1v4M11 1v4"/></svg>Schedule</div>
    <div class="nav-section">Warehouse</div>
    <div class="nav-item" onclick="showPage('catalog',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>Catalog</div>
    <div class="nav-item" onclick="showPage('inventory',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="8" width="3" height="6"/><rect x="6.5" y="5" width="3" height="9"/><rect x="11" y="2" width="3" height="12"/></svg>Stock</div>
    <div class="nav-item" onclick="showPage('orders',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10l-1.5 7H4.5L3 3z"/><circle cx="6" cy="13.5" r="1"/><circle cx="11" cy="13.5" r="1"/></svg>Orders</div>
    <div class="nav-section">Field</div>
    <div class="nav-item" onclick="showPage('gps',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2C5.8 2 4 3.8 4 6c0 3.5 4 8 4 8s4-4.5 4-8c0-2.2-1.8-4-4-4z"/><circle cx="8" cy="6" r="1.5"/></svg>GPS Tracking</div>
    <div class="nav-item" onclick="showPage('hours',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>Hours</div>
    <div class="nav-item" onclick="showPage('companies',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1.5 13c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4"/></svg>Sub Companies</div>
    <div class="nav-section">Finance</div>
    <div class="nav-item" onclick="showPage('financials',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l3-4 3 2 3-5 3 3"/><rect x="2" y="2" width="12" height="12" rx="1"/></svg>Financials</div>
    <div class="nav-item" onclick="showPage('reports',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 13V8m4 5V5m4 8V2"/></svg>Reports</div>
    <div class="nav-item" onclick="showPage('users',this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/></svg>Users</div>
  </div>
  <div class="sidebar-foot">
    <div class="user-pill" onclick="doSignOut()">
      <div class="av" id="user-av" style="width:28px;height:28px;font-size:10px"></div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="user-name">…</div><div style="font-size:10px;color:#414e63">Sign out</div></div>
    </div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-right" id="topbar-actions"></div>
  </div>
  <div id="page-area"><div class="loading">Loading…</div></div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-backdrop" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)">
    <div class="modal-box">
      <div class="modal-title"><span id="modal-title-text"></span><span class="modal-close" onclick="closeModal()">×</span></div>
      <div id="modal-body"></div>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="modal-ok-btn">Save</button></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// FieldAxisHQ Admin — Direct Supabase Edition
// ══════════════════════════════════════════
const sb = window.supabase.createClient(
  'https://htkvgfmbcoozmkiairvt.supabase.co',
  'sb_publishable_1U37N6iZ8Is4mF_aR9kThg_DS7wExWO'
)
let ME = null, allJobs = [], allCatalog = [], currentJobId = null, currentJob = null

// ── BOOT ──────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const { data:{ session } } = await sb.auth.getSession()
  if (!session) { location.href='index.html'; return }
  const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single()
  ME = profile || { id: session.user.id, full_name: session.user.email, role: 'admin' }
  const name = ME.full_name || session.user.email
  document.getElementById('user-name').textContent = name
  const av = document.getElementById('user-av')
  av.textContent = ini(name); Object.assign(av.style, avS(name))
  showPage('dashboard', document.querySelector('.nav-item'))
})
function doSignOut() { sb.auth.signOut(); location.href='index.html' }

// ── NAVIGATION ────────────────────────────
function showPage(page, navEl) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
  if (navEl) navEl.classList.add('active')
  document.getElementById('topbar-actions').innerHTML = ''
  const titles = { dashboard:'Dashboard', jobs:'All Jobs', newjob:'New Job', schedule:'Schedule', catalog:'Parts Catalog', inventory:'Stock / Inventory', orders:'Orders', gps:'GPS Tracking', hours:'Labor Hours', companies:'Sub Companies', financials:'Financials', reports:'Reports', users:'Users', jobdetail:'Job Detail' }
  document.getElementById('page-title').textContent = titles[page] || page
  const area = document.getElementById('page-area')
  area.innerHTML = '<div class="loading"><div class="spin"></div> Loading…</div>'
  const pages = { dashboard:pgDash, jobs:pgJobs, newjob:pgNewJob, schedule:pgSchedule, catalog:pgCatalog, inventory:pgInventory, orders:pgOrders, gps:pgGPS, hours:pgHours, companies:pgCompanies, financials:pgFinancials, reports:pgReports, users:pgUsers }
  if (pages[page]) pages[page]()
  else area.innerHTML = '<div class="empty">Page coming soon</div>'
}

// ── MODAL ─────────────────────────────────
function modal(title, html, onOk, okLabel='Save') {
  document.getElementById('modal-title-text').textContent = title
  document.getElementById('modal-body').innerHTML = html
  const btn = document.getElementById('modal-ok-btn')
  btn.textContent = okLabel; btn.onclick = onOk
  document.getElementById('modal').style.display = 'block'
}
function closeModal() { document.getElementById('modal').style.display = 'none' }

// ── HELPERS ───────────────────────────────
function toast(msg, type='success') {
  const colors={success:'#16a34a',error:'#dc2626',warn:'#d97706',info:'#2563eb'}
  const icons={success:'✓',error:'✗',warn:'⚠',info:'ℹ'}
  const t=document.createElement('div')
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#0c1220;border-radius:99px;padding:10px 20px;border-left:3px solid '+colors[type]+';box-shadow:0 6px 24px rgba(0,0,0,.8);display:flex;align-items:center;gap:8px;font-size:13px;color:#e8edf5;white-space:nowrap;pointer-events:none'
  t.innerHTML='<span style="color:'+colors[type]+'">'+icons[type]+'</span>'+msg
  document.body.appendChild(t)
  setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s'},3000)
  setTimeout(()=>t.remove(),3300)
}
function v(id){ return (document.getElementById(id)||{}).value||'' }
function fN(id){ const n=parseFloat(v(id)); return isNaN(n)?null:n }
function uuid(){ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)}) }
function ini(n){ return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) }
const AVC=[['#1a2e50','#60a5fa'],['#0f2a1f','#4ade80'],['#2d1a08','#fb923c'],['#1e1040','#a78bfa'],['#0a2535','#38bdf8'],['#2e0f0f','#f87171'],['#0f2820','#6ee7b7'],['#28240a','#fcd34d']]
function avS(n){ const i=(n||'').charCodeAt(0)%AVC.length; return{background:AVC[i][0],color:AVC[i][1]} }
function fmtDate(d){ if(!d)return'—'; try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d} }
function fmtTime(d){ if(!d)return'—'; try{return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}catch{return d} }
function fmtHours(h){ if(!h)return'0h'; const hr=Math.floor(h),m=Math.round((h-hr)*60); return m?hr+'h '+m+'m':hr+'h' }
function fmtMoney(n,d=0){ if(n==null)return'—'; return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}) }
function isOD(due,phase){ return due&&!['complete'].includes(phase)&&new Date(due)<new Date() }
function phaseBadge(p){
  const m={not_started:['bg-gray','Not Started'],pre_construction:['bg-blue','Pre-Con'],rough_in:['bg-amber','Rough-in'],trim_out:['bg-teal','Trim-out'],inspection:['bg-purple','Inspection'],closeout:['bg-green','Closeout'],complete:['bg-green','Complete']}
  const[cls,lbl]=m[p]||['bg-gray',p||'—']; return`<span class="badge ${cls}">${lbl}</span>`
}
function roleBadge(r){ const m={admin:'bg-purple',pm:'bg-blue',stager:'bg-amber',foreman:'bg-teal',technician:'bg-green',sub_lead:'bg-amber',sub_worker:'bg-gray'}; return`<span class="badge ${m[r]||'bg-gray'}">${r||'—'}</span>` }
function empty(icon,txt){ return`<div class="empty"><div class="empty-icon">${icon}</div>${txt}</div>` }

function jTab(el, id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))

  const tc = document.getElementById(id)
  if (tc) { tc.style.display='block'; loadTab(id) }
}

async function updatePhase(phase) {
  await sb.from('jobs').update({phase,updated_at:new Date().toISOString()}).eq('id',currentJobId)
  currentJob.phase = phase; toast('Phase updated')
}
async function saveInfo() {
  const u={name:v('ed-name'),address:v('ed-addr'),gps_lat:fN('ed-lat'),gps_lng:fN('ed-lng'),gps_radius_ft:parseInt(v('ed-rad'))||250,gc_company:v('ed-gc'),gc_contact:v('ed-gcc'),gc_phone:v('ed-gcp'),super_name:v('ed-sup'),super_phone:v('ed-supp'),date_start:v('ed-start')||null,due_date:v('ed-due')||null,date_roughin:v('ed-dr')||null,date_trimout:v('ed-dt')||null,date_inspection:v('ed-di')||null,date_closeout:v('ed-dco')||null,completion_date:v('ed-comp')||null,pct_complete:parseInt(v('ed-pct'))||0,contract_value:fN('ed-cv'),labor_rate:fN('ed-lr'),updated_at:new Date().toISOString()}
  const {error}=await sb.from('jobs').update(u).eq('id',currentJobId)
  if(error){toast(error.message,'error');return}
  currentJob={...currentJob,...u}; document.getElementById('page-title').textContent=u.name; toast('Saved ✓')
}
async function saveScope() {
  const {error}=await sb.from('jobs').update({scope:v('sc-scope'),install_notes:v('sc-notes'),job_walk_notes:v('sc-jwn'),updated_at:new Date().toISOString()}).eq('id',currentJobId)
  if(error)toast(error.message,'error'); else toast('Saved ✓')
}
async function archiveJob() {
  if(!confirm('Archive this job?'))return
  await sb.from('jobs').update({archived:true}).eq('id',currentJobId)
  toast('Archived'); showPage('jobs',null)
}

async function addWorkerModal() {
  const {data:all}=await sb.from('profiles').select('id,full_name,email').eq('is_active',true)
  const {data:ex}=await sb.from('job_workers').select('worker_id').eq('job_id',currentJobId).eq('is_active',true)
  const exIds=new Set((ex||[]).map(e=>e.worker_id))
  const avail=(all||[]).filter(w=>!exIds.has(w.id))
  modal('Add Worker',`<div class="fg"><label class="fl">Select Worker</label><select class="fs" id="aw-sel"><option value="">— Select —</option>${avail.map(w=>`<option value="${w.id}">${w.full_name} (${w.email||''})</option>`).join('')}</select></div>`,
    async()=>{const wid=v('aw-sel');if(!wid)return;await sb.from('job_workers').upsert({id:uuid(),job_id:currentJobId,worker_id:wid,is_active:true,added_by:ME?.full_name,added_at:new Date().toISOString()},{onConflict:'job_id,worker_id'});closeModal();toast('Added');delete document.getElementById('jt-workers').dataset.loaded;loadWorkers(document.getElementById('jt-workers'))})
}
async function removeWorker(id) {
  await sb.from('job_workers').update({is_active:false}).eq('id',id)
  toast('Removed'); delete document.getElementById('jt-workers').dataset.loaded; loadWorkers(document.getElementById('jt-workers'))
}

  const {data:cat}=await sb.from('catalog').select('*').order('name').limit(200)
  modal('Add Part to Job',`
  <div class="fg"><label class="fl">Barcode *</label><input class="fi" id="ap-bc" placeholder="Scan or type"></div>
  <div class="fg"><label class="fl">Name</label><input class="fi" id="ap-nm" placeholder="Auto-fills from catalog"></div>
  <div class="two"><div class="fg"><label class="fl">Qty</label><input class="fi" type="number" id="ap-qty" value="1" min="1"></div>
  <div class="fg"><label class="fl">Action</label><select class="fs" id="ap-act"><option value="stage">Stage In</option><option value="out">Sign Out</option></select></div></div>`,
  async()=>{
    const bc=v('ap-bc').trim(); if(!bc){toast('Barcode required','error');return}
    const catItem=cat?.find(c=>c.barcode===bc)
    const name=v('ap-nm')||catItem?.name||bc
    const qty=parseInt(v('ap-qty'))||1
    const action=v('ap-act')
    const now=new Date().toISOString()
    const row={id:uuid(),job_id:currentJobId,part_id:bc,part_name:name,assigned_qty:qty,taken_qty:action==='out'?qty:0,status:action==='stage'?'staged':'signed_out',staged_by:ME?.full_name,staged_at:now,created_at:now,updated_at:now}
    const {error}=await sb.from('job_parts').insert(row)
    if(error){toast(error.message,'error');return}
    // Deduct from inventory
    const {data:inv}=await sb.from('inventory').select('*').eq('id',bc).single()
    if(inv){await sb.from('inventory').update({qty:Math.max(0,inv.qty-qty),updated_at:now}).eq('id',bc)}
    closeModal(); toast('Part added'); delete document.getElementById('jt-parts').dataset.loaded; loadParts(document.getElementById('jt-parts'))
  })

  el.innerHTML=`

      <div class="fin-row"><span style="font-size:12px;font-weight:600">Total Cost</span><span style="font-size:12px;font-weight:600">${fmtMoney(totalCost)}</span></div>
    </div>
  </div>
  <div class="card" style="background:${profit>=0?'rgba(22,163,74,.08)':'rgba(220,38,38,.08)'};border-color:${profit>=0?'rgba(22,163,74,.2)':'rgba(220,38,38,.2)'}">

async function pgSchedule() {
  const {data:jobs}=await sb.from('jobs').select('id,name,address,phase,date_start,due_date,date_roughin,date_trimout,date_inspection,date_closeout').eq('archived',false).order('due_date',{ascending:true,nullsFirst:false})

  const events=[]
  ;(jobs||[]).forEach(j=>{
    const add=(date,type)=>{if(!date)return;const d=new Date(date);const dif=Math.round((d-today)/86400000);events.push({job_id:j.id,job_name:j.name,phase:j.phase,date,date_type:type,days_away:dif})}
    add(j.date_roughin,'Rough-in'); add(j.date_trimout,'Trim-out'); add(j.date_inspection,'Inspection'); add(j.date_closeout,'Closeout'); add(j.due_date,'Due Date')
  })

          <div style="font-size:17px;font-weight:700;color:${dA<0?'#dc2626':dA<=7?'#d97706':'#e8edf5'};line-height:1">${d.getDate()}</div>
          <div style="font-size:9px;color:#8a96ab">${d.toLocaleDateString('en-US',{month:'short'})}</div>
        </div>
        <div style="flex:1"><div style="font-size:12px;font-weight:500">${e.job_name}</div><div style="font-size:10px;color:#414e63">${e.date_type}</div></div>
        <span class="badge ${dA<0?'bg-red':dA<=7?'bg-amber':'bg-gray'}">${dA<0?Math.abs(dA)+'d late':dA===0?'Today':dA+'d'}</span>
      </div>`}).join('')

}

async function pgReports() {
  document.getElementById('page-area').innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    ${[['⏱','Labor Report','GPS check-in logs','labor'],['📦','Parts Report','All job parts','parts'],['📋','Jobs Export','All jobs with dates','jobs'],['💰','Financials','P&L per job','fin'],['📍','GPS Log','All check-ins','gps_csv'],['📊','Inventory','Stock levels','inv_csv']].map(([ico,ttl,sub,t])=>`<div style="background:#0c1220;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;cursor:pointer" onclick="exportReport('${t}')"><div style="font-size:24px;margin-bottom:8px">${ico}</div><div style="font-size:13px;font-weight:500;margin-bottom:3px">${ttl}</div><div style="font-size:11px;color:#414e63">${sub}</div></div>`).join('')}
  </div>`
}
async function exportReport(type) {
  toast('Preparing export…','info')
  let csv='',fn=type+'-report.csv'
  if(type==='labor'){const{data}=await sb.from('checkins').select('*,jobs(name),profiles:worker_id(full_name,companies(name))').order('checkin_at',{ascending:false});csv='Worker,Company,Job,Check-in,Check-out,Hours,Dist(ft)\n'+(data||[]).map(c=>`"${c.profiles?.full_name||''}","${c.profiles?.companies?.name||''}","${c.jobs?.name||''}","${c.checkin_at}","${c.checkout_at||''}",${c.hours_logged||''},${c.checkin_dist_ft||''}`).join('\n')}
  else if(type==='parts'){const{data}=await sb.from('job_parts').select('*,jobs(name)').order('created_at',{ascending:false});csv='Part,Barcode,Job,Status,Qty,Staged By\n'+(data||[]).map(p=>`"${p.part_name}","${p.part_id}","${p.jobs?.name||''}","${p.status}",${p.assigned_qty},"${p.staged_by||''}"`).join('\n')}
  else if(type==='jobs'){const{data}=await sb.from('jobs').select('*').order('created_at',{ascending:false});csv='Name,Address,Phase,Due Date,Completion,Contract,GC\n'+(data||[]).map(j=>`"${j.name}","${j.address||''}","${j.phase}","${j.due_date||''}","${j.completion_date||''}",${j.contract_value||''},"${j.gc_company||''}"`).join('\n')}
  else if(type==='fin'){const{data}=await sb.from('jobs').select('id,name,phase,contract_value,labor_rate').order('name');csv='Job,Phase,Contract,Margin\n'+(data||[]).map(j=>`"${j.name}","${j.phase}",${j.contract_value||''},`).join('\n')}
  else if(type==='gps_csv'){const{data}=await sb.from('checkins').select('*,profiles:worker_id(full_name)').order('checkin_at',{ascending:false});csv='Worker,Job,In,Out,Hours\n'+(data||[]).map(c=>`"${c.profiles?.full_name||''}","${c.job_id}","${c.checkin_at}","${c.checkout_at||''}",${c.hours_logged||''}`).join('\n')}
  else if(type==='inv_csv'){const{data}=await sb.from('inventory').select('*').order('name');csv='ID,Name,Qty,Min Qty,Status\n'+(data||[]).map(i=>`"${i.id}","${i.name}",${i.qty},${i.min_qty||''},${i.qty<=(i.min_qty||0)?'LOW':'OK'}`).join('\n')}
  if(csv){const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=fn;a.click();toast('Downloading…')}
}
async function pgUsers() {
  document.getElementById('topbar-actions').innerHTML='<button class="btn btn-primary btn-sm" onclick="addUserModal()">+ Add User</button>'
  const {data}=await sb.from('profiles').select('*,companies(name)').order('created_at')
  document.getElementById('page-area').innerHTML=`<div class="card" style="padding:0;overflow:hidden">${(data||[]).length?`<table class="tbl"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Company</th><th>Status</th><th></th></tr></thead><tbody>${(data||[]).map(u=>`<tr><td style="font-weight:500">${u.full_name}</td><td style="font-size:11px;color:#8a96ab">${u.email||'—'}</td><td>${roleBadge(u.role)}</td><td style="font-size:11px;color:#8a96ab">${u.companies?.name||'Internal'}</td><td><span class="badge ${u.is_active?'bg-green':'bg-gray'}">${u.is_active?'Active':'Inactive'}</span></td><td><button class="btn btn-sm" onclick="editUserModal('${u.id}','${u.role}','${u.is_active}')">Edit</button></td></tr>`).join('')}</tbody></table>`:empty('👥','No users')}</div>`
}
function addUserModal() {
  modal('Add User',`<div class="fg"><label class="fl">Full Name *</label><input class="fi" id="au-nm"></div><div class="fg"><label class="fl">Email *</label><input class="fi" id="au-em" type="email"></div><div class="fg"><label class="fl">Role *</label><select class="fs" id="au-rl"><option value="sub_worker">Sub Worker</option><option value="sub_lead">Sub Lead</option><option value="technician">Technician</option><option value="stager">Stager</option><option value="foreman">Foreman</option><option value="pm">PM</option><option value="admin">Admin</option></select></div>`,
  async()=>{const nm=v('au-nm').trim(),em=v('au-em').trim();if(!nm||!em){toast('Name+email required','error');return};const{error}=await sb.from('profiles').insert({id:uuid(),full_name:nm,email:em,role:v('au-rl'),is_active:true,created_at:new Date().toISOString()});if(error)toast(error.message,'error');else{closeModal();toast('User added — send Supabase invite for login');pgUsers()}})
}
function editUserModal(id,role,active) {
  modal('Edit User',`<div class="fg"><label class="fl">Role</label><select class="fs" id="eu-rl"><option value="sub_worker">Sub Worker</option><option value="sub_lead">Sub Lead</option><option value="technician">Technician</option><option value="stager">Stager</option><option value="foreman">Foreman</option><option value="pm">PM</option><option value="admin">Admin</option></select></div><div class="fg"><label class="fl">Status</label><select class="fs" id="eu-act"><option value="true">Active</option><option value="false">Inactive</option></select></div>`,
  async()=>{await sb.from('profiles').update({role:v('eu-rl'),is_active:v('eu-act')==='true'}).eq('id',id);closeModal();toast('Updated');pgUsers()})
  setTimeout(()=>{document.getElementById('eu-rl').value=role;document.getElementById('eu-act').value=String(active)},50)
}
</script>
</body>
</html>
